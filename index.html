<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NFC Tracker Pro v11</title>
    <style>
        :root {
            --primary: #4a90e2; --bg: #f4f7f6; --text: #333; --card: #ffffff;
            --danger: #ff6b6b; --work: #2ed573; --break: #f39c12;
            --holiday: #ff4757; --vacation: #3498db; --sick: #f1c40f;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; color: var(--text); user-select: none; -webkit-user-select: none; touch-action: manipulation; }
        .container { width: min(95vw, 600px); background: var(--card); padding: 15px; min-height: 100vh; display: flex; flex-direction: column; gap: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.1); box-sizing: border-box; }
        
        .status-box { padding: 15px; background: #eef6ff; border-radius: 12px; text-align: center; font-weight: bold; color: var(--primary); border: 1px solid #d0e5ff; }
        .timer-display { text-align: center; font-size: 2.2rem; font-weight: 800; margin: 10px 0; color: var(--primary); font-variant-numeric: tabular-nums; }
        
        .chip-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; position: relative; }
        .chip-btn { padding: 15px 5px; background: #f8f9fa; border-radius: 15px; text-align: center; border: 2px solid #eee; position: relative; touch-action: none; }
        .chip-btn.active { border-color: var(--primary); background: #e0f0ff; }
        .edit-btn { position: absolute; top: 5px; right: 5px; font-size: 1.1rem; cursor: pointer; padding: 4px; z-index: 10; }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; background: #eee; padding: 4px; border-radius: 8px; }
        .day { padding: 10px 0; background: #fff; border-radius: 4px; text-align: center; font-size: 0.8rem; cursor: pointer; }
        .day.today { outline: 3px solid var(--primary); z-index: 1; }
        .day.status-off { background: var(--holiday); color: white; }
        .day.status-vac { background: var(--vacation); color: white; }
        .day.status-sick { background: var(--sick); color: black; }
        .day.has-data { background: var(--work); color: white; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; padding: 10px; backdrop-filter: blur(5px); }
        .modal-content { background: white; padding: 20px; border-radius: 20px; width: 100%; max-width: 450px; max-height: 90vh; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.3); display: flex; flex-direction: column; gap: 10px; box-sizing: border-box; }
        
        .emoji-section-title { font-weight: bold; margin-top: 10px; font-size: 0.85rem; color: #666; text-align: left; }
        .emoji-picker { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-bottom: 10px; background: #f8f9fa; padding: 8px; border-radius: 10px; border: 1px solid #eee; }
        .emoji-item { font-size: 1.4rem; cursor: pointer; text-align: center; padding: 4px; border-radius: 6px; }

        .config-group { background: #f9f9f9; padding: 12px; border-radius: 12px; border: 1px solid #eee; display: flex; flex-direction: column; gap: 8px; text-align: left; }
        .config-row { display: flex; align-items: center; justify-content: space-between; font-size: 0.9rem; }
        
        button { padding: 12px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; font-size: 0.9rem; }
        button:active { opacity: 0.7; }
        input, select, textarea { padding: 10px; border: 1px solid #ccc; border-radius: 8px; width: 100%; box-sizing: border-box; font-family: inherit; }
        .btn-main { background: var(--primary); color: white; }
        .btn-sec { background: #e2e8f0; color: #333; }
        .btn-danger { background: var(--danger); color: white; }
        
        .report-area { width: 100%; height: 200px; font-family: monospace; font-size: 0.8rem; background: #1e1e1e; color: #f8f8f2; padding: 10px; border-radius: 8px; resize: none; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <div id="status" class="status-box">Inicjalizacja...</div>
    <div id="timer" class="timer-display">00:00:00</div>
    
    <div class="chip-grid" id="chipGrid"></div>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 5px;">
        <button class="btn-main" onclick="openEdit(null)" style="background:var(--work)" id="lblAddTask">+ Zadanie</button>
        <button class="btn-sec" onclick="openSettings()" id="lblGrafik">⚙️ Grafik</button>
        <button class="btn-sec" onclick="openBreaks()" style="background:var(--break); color:white;" id="lblPrzerwy">☕ Przerwy</button>
    </div>
    <button class="btn-danger" onclick="stopTask()" style="width:100%; margin-top:5px;" id="lblEndWork">⏹ ZAKOŃCZ PRACĘ</button>

    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:15px;">
        <button onclick="changeMonth(-1)" class="btn-sec">◀</button>
        <h3 id="monthTitle" style="margin:0"></h3>
        <button onclick="changeMonth(1)" class="btn-sec">▶</button>
    </div>
    <div class="calendar-grid" id="calendar"></div>

    <div class="config-group" style="margin-top: 15px;">
        <h4 style="margin:0 0 5px 0;" id="lblReportPanel">📊 Panel Generowania Raportów</h4>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
            <button class="btn-sec" onclick="showTextReport('dobowy')" id="lblReportDay">📅 Raport Dobowy</button>
            <button class="btn-sec" onclick="showTextReport('miesieczny')" id="lblReportMonth">📅 Raport Miesięczny</button>
        </div>
    </div>
</div>

<div id="reportModal" class="modal"><div class="modal-content">
    <h3 id="reportModalTitle">Raport</h3>
    <p style="font-size:0.8rem; color:#666; margin:0;" id="lblReportInfo">Skopiuj poniższą treść:</p>
    <textarea id="reportText" class="report-area" readonly></textarea>
    <button class="btn-main" onclick="copyReport()" id="lblCopyReport">📋 Kopiuj raport do schowka</button>
    <button class="btn-sec" onclick="closeModals()" id="lblCloseReport">Zamknij</button>
</div></div>

<div id="settingsModal" class="modal"><div class="modal-content">
    <h3 id="lblSchTitle">Harmonogram Dni</h3>
    <div id="schList" style="display:flex; flex-direction:column; gap:8px;"></div>
    <hr>
    <label id="lblAutoAssign">Auto-start przypisany do:</label>
    <select id="autoTaskSelect"></select>
    <button class="btn-main" onclick="saveSettings()" id="lblSaveSch">Zapisz Grafik</button>
    <button class="btn-sec" onclick="closeModals()" id="lblCloseSch">Zamknij</button>
</div></div>

<div id="breakModal" class="modal"><div class="modal-content">
    <h3 id="lblBreakTitle">Ustawienia Przerw</h3>
    <p style="font-size:0.8rem; color:#666; margin:0;" id="lblBreakDesc">Zdefiniuj pory automatycznych pauz.</p>
    <div class="config-group">
        <label><b>☕ Przerwa 1 (15 minut)</b></label>
        <div class="config-row"><span id="lblStartTime1">Start:</span> <input type="time" id="p1S" style="width:130px"></div>
    </div>
    <div class="config-group">
        <label><b>🥪 Przerwa 2 (30 minut)</b></label>
        <div class="config-row"><span id="lblStartTime2">Start:</span> <input type="time" id="p2S" style="width:130px"></div>
    </div>
    <button class="btn-main" onclick="saveBreaks()" id="lblSaveBreaks">Zapisz Przerwy</button>
    <button class="btn-sec" onclick="closeModals()" id="lblCloseBreaks">Zamknij</button>
</div></div>

<div id="editModal" class="modal"><div class="modal-content">
    <h3 id="lblManageTask">Zarządzaj Zadaniem</h3>
    <input type="text" id="eName" placeholder="">
    
    <div style="max-height: 180px; overflow-y: auto; padding-right: 5px;">
        <div class="emoji-section-title" id="lblCat1">Przemysł i Budowa</div>
        <div class="emoji-picker" id="pickerIndustrial"></div>
        <div class="emoji-section-title" id="lblCat2">Narzędzia i Maszyny</div>
        <div class="emoji-picker" id="pickerTools"></div>
        <div class="emoji-section-title" id="lblCat3">Logistyka i Biuro</div>
        <div class="emoji-picker" id="pickerOffice"></div>
    </div>

    <input type="hidden" id="eIcon">
    <div class="config-group">
        <label><b id="lblNfcUid">Identyfikator NFC (UID)</b></label>
        <input type="text" id="eNfc" placeholder="Zbliż tag NFC aby sczytać ID...">
    </div>
    
    <button class="btn-main" onclick="saveTask()" id="lblSaveTask">Zapisz Zadanie</button>
    <button id="delBtn" onclick="deleteTask()" class="btn-danger">Usuń Zadanie</button>
    <button onclick="closeModals()" class="btn-sec" id="lblCancelTask">Anuluj</button>
</div></div>

<div id="dayModal" class="modal"><div class="modal-content">
    <h3 id="dayModalTitle"></h3>
    <div id="daySummary" style="background:#f8f9fa; padding:12px; border-radius:10px; line-height: 1.5; text-align: left;"></div>
    <hr>
    <label id="lblChangeDayStatus">Zmień przeznaczenie dnia:</label>
    <select id="dayStatusSelect" onchange="updateDayStatus()"></select>
    <button onclick="closeModals()" class="btn-sec" style="margin-top:10px;" id="lblCloseDay">Zamknij</button>
</div></div>

<script src="cordova.js"></script>
<script>
    const DB_NAME = "NFC_TRACKER_V11";
    
    const LANGS = {
        pl: {
            ready: "Gotowy - Zbliż tag NFC", statusWaiting: "Oczekiwanie", workingOn: "Praca nad: ", pause: "Trwa pauza.",
            addTask: "+ Zadanie", grafik: "⚙️ Grafik", przerwy: "☕ Przerwy", endWork: "⏹ ZAKOŃCZ PRACĘ",
            repPanel: "📊 Panel Generowania Raportów", repDay: "📅 Raport Dobowy (Dziś)", repMonth: "📅 Raport Miesięczny",
            repInfo: "Skopiuj raport:", copyRep: "📋 Kopiuj raport do schowka",
            schTitle: "Harmonogram Dni", autoAssign: "Auto-start przypisany do:", saveSch: "Zapisz Grafik",
            breakTitle: "Ustawienia Przerw", breakDesc: "Zdefiniuj pory automatycznych pauz.", saveBreaks: "Zapisz Przerwy",
            manageTask: "Zarządzaj Zadaniem", nfcUid: "Identyfikator NFC (UID)",
            saveTask: "Zapisz Zadanie", cancel: "Anuluj", changeDayStatus: "Zmień status dnia:",
            optWork: "Dzień pracy (Standardowy)", optOff: "Dzień Wolny / Weekend", optVac: "🌴 Urlop wypoczynkowy", optSick: "🤒 Chorobowe / L4",
            noData: "Brak danych do wygenerowania raportu dla tego okresu.", close: "Zamknij",
            cat1: "Przemysł i Budowa", cat2: "Narzędzia i Maszyny", cat3: "Logistyka i Biuro",
            daySummaryTitle: "Zestawienie prac:", dayNoData: "Brak aktywności."
        },
        de: {
            ready: "Bereit - NFC Tag scannen", statusWaiting: "Warten", workingOn: "Arbeit an: ", pause: "Pause aktiv.",
            addTask: "+ Aufgabe", grafik: "⚙️ Plan", przerwy: "☕ Pausen", endWork: "⏹ ARBEIT BEENDEN",
            repPanel: "📊 Berichtsgenerator-Panel", repDay: "📅 Tagesbericht", repMonth: "📅 Monatsbericht",
            repInfo: "Kopieren Sie den Inhalt:", copyRep: "📋 In Zwischenablage kopieren",
            schTitle: "Arbeitszeitplan", autoAssign: "Auto-Start zugewiesen an:", saveSch: "Plan speichern",
            breakTitle: "Pauseneinstellungen", breakDesc: "Definieren Sie automatische Pausenzeiten.", saveBreaks: "Pausen speichern",
            manageTask: "Aufgabe verwalten", nfcUid: "NFC-ID (UID)",
            saveTask: "Aufgabe speichern", cancel: "Abbrechen", changeDayStatus: "Tagesstatus ändern:",
            optWork: "Arbeitstag", optOff: "Freier Tag / Wochenende", optVac: "🌴 Erholungsurlaub", optSick: "🤒 Krankmeldung",
            noData: "Keine Daten vorhanden.", close: "Schließen",
            cat1: "Industrie & Bau", cat2: "Werkzeuge & Maschinen", cat3: "Logistik & Büro",
            daySummaryTitle: "Arbeitsübersicht:", dayNoData: "Keine Aktivitäten."
        },
        en: {
            ready: "Ready - Scan NFC Tag", statusWaiting: "Waiting", workingOn: "Working on: ", pause: "Pause in progress.",
            addTask: "+ Task", grafik: "⚙️ Schedule", przerwy: "☕ Breaks", endWork: "⏹ END WORK",
            repPanel: "📊 Report Panel", repDay: "📅 Daily Report", repMonth: "📅 Monthly Report",
            repInfo: "Copy report:", copyRep: "📋 Copy to clipboard",
            schTitle: "Day Schedule", autoAssign: "Auto-start assigned to:", saveSch: "Save Schedule",
            breakTitle: "Break Settings", breakDesc: "Define automatic break times.", saveBreaks: "Save Breaks",
            manageTask: "Manage Task", nfcUid: "NFC Identifier (UID)",
            saveTask: "Save Task", cancel: "Cancel", changeDayStatus: "Change day status:",
            optWork: "Workday (Standard)", optOff: "Day Off / Weekend", optVac: "🌴 Paid Vacation", optSick: "🤒 Sick Leave",
            noData: "No data available.", close: "Close",
            cat1: "Industry & Construction", cat2: "Tools & Machines", cat3: "Logistics & Office",
            daySummaryTitle: "Work summary:", dayNoData: "No registered activity."
        }
    };

    let curLang = LANGS.en;
    const sysLang = navigator.language.slice(0, 2);
    if (LANGS[sysLang]) curLang = LANGS[sysLang];

    const EMOJIS = {
        industrial: ['🏭','🏢','🏗️','🚜','🔌','⚙️','🧱','🛖','🔧','🔨'],
        tools: ['🛠️','👷','🔧','🔩','⚒️','🔬','⚡','📐','⚖️','🔋'],
        office: ['💻','🚛','📦','📋','🧹','💼','📁','📝','🖊️','✉️']
    };

    let state = {
        tasks: [
            {id: 1, name: sysLang === 'pl' ? 'Produkcja' : 'Production', icon: '🏭', nfc: ''},
            {id: 2, name: sysLang === 'pl' ? 'Magazyn' : 'Warehouse', icon: '📦', nfc: ''}
        ],
        history: [],
        dayStats: {},
        activeTask: null,
        activeBreak: null,
        autoTaskId: "last",
        schedule: {
            1: {en:true, s:"08:00", e:"16:00", p1:"10:00", p2:"13:00"},
            2: {en:true, s:"08:00", e:"16:00", p1:"10:00", p2:"13:00"},
            3: {en:true, s:"08:00", e:"16:00", p1:"10:00", p2:"13:00"},
            4: {en:true, s:"08:00", e:"16:00", p1:"10:00", p2:"13:00"},
            5: {en:true, s:"08:00", e:"15:00", p1:"10:00", p2:"12:30"},
            6: {en:false, s:"00:00", e:"00:00", p1:"", p2:""},
            0: {en:false, s:"00:00", e:"00:00", p1:"", p2:""}
        }
    };

    let viewDate = new Date();
    let currentDaySelected = "";

    function getTodayStr() {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }

    // Odpalenie silnika aplikacji mobilnej po załadowaniu systemu operacyjnego Android
    document.addEventListener('deviceready', () => {
        init();
        initNFCSystem();
    }, false);

    async function init() {
        translateUI();
        const dbReq = indexedDB.open(DB_NAME, 1);
        dbReq.onupgradeneeded = e => e.target.result.createObjectStore("data");
        dbReq.onsuccess = e => {
            e.target.result.transaction("data").objectStore("data").get("state").onsuccess = ev => {
                if(ev.target.result) state = ev.target.result;
                renderTasks();
                renderCalendar();
                initEmojiPickers();
                setupTouchDragAndDrop();
                setInterval(tick, 1000);
            };
        };
    }

    /* --- PRAWDZIWY ODSŁUCH CHIPÓW NFC W TLE --- */
    function initNFCSystem() {
        if (typeof nfc === 'undefined') {
            console.log("NFC nie jest gotowe lub brak sprzętu.");
            return;
        }

        // Aktywujemy stałe nasłuchiwanie anteny na zbliżenie dowolnego taga
        nfc.addTagDiscoveredListener(
            function(nfcEvent) {
                // Konwersja surowego ID z anteny na czytelny hex-string (np. "04730e227d6180")
                const uid = nfc.bytesToHexString(nfcEvent.tag.id).toUpperCase();
                
                // Przypadek A: Jesteśmy w trybie edycji zadania - zapisujemy nowy tag do bazy
                if (document.getElementById('editModal').style.display === 'flex') {
                    document.getElementById('eNfc').value = uid;
                    navigator.notification.beep(1); // Sygnał dźwiękowy
                    return;
                }

                // Przypadek B: Aplikacja jest na głównym ekranie - skanowanie automatycznie przełącza zadanie!
                const matchedTask = state.tasks.find(t => t.nfc.toUpperCase() === uid);
                if (matchedTask) {
                    navigator.notification.beep(1);
                    startTask(matchedTask.id);
                } else {
                    navigator.notification.alert("Wykryto nieznany tag NFC: " + uid + "\nWejdź w edycję wybranego zadania, aby go przypisać.", null, "NFC Tracker");
                }
            },
            function() {
                document.getElementById('status').innerText = curLang.ready;
            },
            function(error) {
                console.log("Błąd inicjalizacji NFC: " + JSON.stringify(error));
            }
        );
    }

    function translateUI() {
        document.getElementById('status').innerText = curLang.ready;
        document.getElementById('lblAddTask').innerText = curLang.addTask;
        document.getElementById('lblGrafik').innerText = curLang.grafik;
        document.getElementById('lblPrzerwy').innerText = curLang.przerwy;
        document.getElementById('lblEndWork').innerText = curLang.endWork;
        document.getElementById('lblReportPanel').innerText = curLang.repPanel;
        document.getElementById('lblReportDay').innerText = curLang.repDay;
        document.getElementById('lblReportMonth').innerText = curLang.repMonth;
        document.getElementById('lblReportInfo').innerText = curLang.repInfo;
        document.getElementById('lblCopyReport').innerText = curLang.copyRep;
        document.getElementById('lblCloseReport').innerText = curLang.close;
        document.getElementById('lblSchTitle').innerText = curLang.schTitle;
        document.getElementById('lblAutoAssign').innerText = curLang.autoAssign;
        document.getElementById('lblSaveSch').innerText = curLang.saveSch;
        document.getElementById('lblCloseSch').innerText = curLang.close;
        document.getElementById('lblBreakTitle').innerText = curLang.breakTitle;
        document.getElementById('lblBreakDesc').innerText = curLang.breakDesc;
        document.getElementById('lblSaveBreaks').innerText = curLang.saveBreaks;
        document.getElementById('lblCloseBreaks').innerText = curLang.close;
        document.getElementById('lblManageTask').innerText = curLang.manageTask;
        document.getElementById('lblNfcUid').innerText = curLang.nfcUid;
        document.getElementById('lblSaveTask').innerText = curLang.saveTask;
        document.getElementById('lblCancelTask').innerText = curLang.cancel;
        document.getElementById('lblChangeDayStatus').innerText = curLang.changeDayStatus;
        document.getElementById('lblCloseDay').innerText = curLang.close;
        document.getElementById('lblCat1').innerText = curLang.cat1;
        document.getElementById('lblCat2').innerText = curLang.cat2;
        document.getElementById('lblCat3').innerText = curLang.cat3;

        const dSel = document.getElementById('dayStatusSelect');
        dSel.innerHTML = `
            <option value="work">${curLang.optWork}</option>
            <option value="off">${curLang.optOff}</option>
            <option value="vacation">${curLang.optVac}</option>
            <option value="sick">${curLang.optSick}</option>
        `;
    }

    function tick() {
        const now = new Date();
        const todayStr = getTodayStr();
        const dayIdx = now.getDay();
        const time = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
        
        const dayStat = state.dayStats[todayStr] || (dayIdx === 0 ? "off" : "work");
        const sch = state.schedule[dayIdx];

        if(dayStat === "work" && sch && sch.en) {
            if(time === sch.s && !state.activeTask && !state.activeBreak) {
                let id = state.autoTaskId === "last" ? (state.history[state.history.length-1]?.id || state.tasks[0].id) : state.autoTaskId;
                startTask(id);
            }
            if(time === sch.e && (state.activeTask || state.activeBreak)) stopTask();
            
            if(time === sch.p1 && state.activeBreak !== 1) toggleBreak(1);
            if(time === addMins(sch.p1, 15) && state.activeBreak === 1) toggleBreak(1);
            if(time === sch.p2 && state.activeBreak !== 2) toggleBreak(2);
            if(time === addMins(sch.p2, 30) && state.activeBreak === 2) toggleBreak(2);
        }
        updateUI();
    }

    function addMins(t, m) {
        if(!t) return "xx:xx";
        let [h, min] = t.split(':').map(Number);
        let d = new Date(); d.setHours(h, min + m);
        return d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');
    }

    function startTask(id) {
        if(state.activeTask) stopTask();
        const t = state.tasks.find(x => x.id == id);
        if(!t) return;
        state.activeTask = { id: t.id, name: t.name, start: Date.now() };
        state.activeBreak = null;
        save(); renderTasks();
    }

    function stopTask() {
        if(state.activeTask) {
            state.history.push({...state.activeTask, end: Date.now()});
            state.activeTask = null;
        }
        state.activeBreak = null;
        save(); renderTasks(); renderCalendar();
    }

    function toggleBreak(n) {
        if(state.activeBreak === n) state.activeBreak = null;
        else { stopTask(); state.activeBreak = n; }
        save();
    }

    function updateUI() {
        const tEl = document.getElementById('timer');
        const sEl = document.getElementById('status');
        if(state.activeBreak) {
            tEl.innerText = "☕ " + (state.activeBreak == 1 ? "15'" : "30'");
            sEl.innerText = curLang.pause;
        } else if(state.activeTask) {
            const diff = Date.now() - state.activeTask.start;
            tEl.innerText = new Date(diff).toISOString().substr(11, 8);
            sEl.innerText = curLang.workingOn + state.activeTask.name;
        } else {
            tEl.innerText = "00:00:00";
            sEl.innerText = typeof nfc !== 'undefined' ? curLang.ready : curLang.statusWaiting;
        }
    }

    function setupTouchDragAndDrop() {
        const grid = document.getElementById('chipGrid');
        let activeEl = null;
        let startX, startY;
        let isMoving = false;

        grid.addEventListener('touchstart', e => {
            const btn = e.target.closest('.chip-btn');
            const isEdit = e.target.closest('.edit-btn');
            if (btn && !isEdit) {
                activeEl = btn;
                const touch = e.touches[0];
                startX = touch.clientX;
                startY = touch.clientY;
                isMoving = false;
            }
        }, { passive: true });

        grid.addEventListener('touchmove', e => {
            if (!activeEl) return;
            const touch = e.touches[0];
            const dx = touch.clientX - startX;
            const dy = touch.clientY - startY;
            
            if (Math.abs(dx) > 10 || Math.abs(dy) > 10) {
                isMoving = true;
                activeEl.style.zIndex = "1000";
                activeEl.style.transform = `translate(${dx}px, ${dy}px)`;
            }
        }, { passive: true });

        grid.addEventListener('touchend', e => {
            if (!activeEl) return;
            activeEl.style.transform = '';
            activeEl.style.zIndex = '';
            
            if (!isMoving) {
                const id = parseInt(activeEl.dataset.id);
                startTask(id);
            } else {
                const touch = e.changedTouches[0];
                const targetEl = document.elementFromPoint(touch.clientX, touch.clientY);
                const dropZone = targetEl ? targetEl.closest('.chip-btn') : null;

                if (dropZone && dropZone !== activeEl) {
                    const elements = [...grid.querySelectorAll('.chip-btn')];
                    const activeIndex = elements.indexOf(activeEl);
                    const dropIndex = elements.indexOf(dropZone);

                    if (activeIndex < dropIndex) {
                        grid.insertBefore(activeEl, dropZone.nextSibling);
                    } else {
                        grid.insertBefore(activeEl, dropZone);
                    }
                    reorderTasksFromDOM();
                }
            }
            activeEl = null;
        });
    }

    function reorderTasksFromDOM() {
        const elements = [...document.querySelectorAll('.chip-btn')];
        const newOrder = [];
        elements.forEach(el => {
            const id = parseInt(el.dataset.id);
            const found = state.tasks.find(x => x.id === id);
            if(found) newOrder.push(found);
        });
        state.tasks = newOrder;
        save();
        renderTasks();
    }

    function renderTasks() {
        const grid = document.getElementById('chipGrid');
        grid.innerHTML = state.tasks.map(t => `
            <div class="chip-btn ${state.activeTask?.id === t.id ? 'active' : ''}" data-id="${t.id}">
                <div class="edit-btn" onclick="openEdit(${t.id}, event)">✏️</div>
                <span style="font-size:1.8rem">${t.icon}</span><br>
                <small style="font-weight:bold;">${t.name}</small>
            </div>`).join('');
    }

    function showTextReport(type) {
        const todayStr = getTodayStr();
        let logs = [];
        let title = "";

        if(type === 'dobowy') {
            logs = state.history.filter(h => new Date(h.start).toLocaleDateString() === new Date(todayStr).toLocaleDateString());
            title = `${curLang.repDay} (${todayStr})`;
        } else {
            const month = viewDate.getMonth();
            const year = viewDate.getFullYear();
            logs = state.history.filter(h => {
                const d = new Date(h.start);
                return d.getMonth() === month && d.getFullYear() === year;
            });
            title = `${curLang.repMonth} (${month + 1}/${year})`;
        }

        if(logs.length === 0) {
            alert(curLang.noData);
            return;
        }

        let reportText = `=== ${title.toUpperCase()} ===\n`;
        reportText += `${new Date().toLocaleString()}\n\n`;
        reportText += `ZADANIE | START | KONIEC | CZAS (H)\n`;
        reportText += `------------------------------------------\n`;
        
        let totalHours = 0;
        logs.forEach(l => {
            const h = ((l.end - l.start) / 3600000).toFixed(2);
            totalHours += parseFloat(h);
            reportText += `${l.name} | ${new Date(l.start).toLocaleTimeString()} | ${new Date(l.end).toLocaleTimeString()} | ${h}h\n`;
        });
        
        reportText += `------------------------------------------\n`;
        reportText += `SUMA GODZIN: ${totalHours.toFixed(2)}h`;

        document.getElementById('reportModalTitle').innerText = title;
        document.getElementById('reportText').value = reportText;
        document.getElementById('reportModal').style.display = 'flex';
    }

    function copyReport() {
        const area = document.getElementById('reportText');
        area.select();
        area.setSelectionRange(0, 99999);
        navigator.clipboard.writeText(area.value)
            .then(() => alert("Skopiowano do schowka!"))
            .catch(() => alert("Skopiuj ręcznie."));
    }

    function renderCalendar() {
        const cal = document.getElementById('calendar');
        cal.innerHTML = '';
        const mNamesPl = ["Styczeń","Luty","Marzec","Kwiecień","Maj","Czerwiec","Lipiec","Sierpień","Wrzesień","Październik","Listopad","Grudzień"];
        const mNamesDe = ["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];
        const mNamesEn = ["January","February","March","April","May","June","July","August","September","October","November","December"];
        
        let mNames = mNamesEn;
        if(sysLang === 'pl') mNames = mNamesPl;
        else if(sysLang === 'de') mNames = mNamesDe;

        document.getElementById('monthTitle').innerText = `${mNames[viewDate.getMonth()]} ${viewDate.getFullYear()}`;
        
        const daysShort = sysLang === 'pl' ? ['Pn','Wt','Śr','Cz','Pt','So','Nd'] : (sysLang === 'de' ? ['Mo','Di','Mi','Do','Fr','Sa','So'] : ['Mo','Tu','We','Th','Fr','Sa','Su']);
        daysShort.forEach(l => cal.innerHTML += `<div style="text-align:center; font-size:0.7rem; font-weight:bold; padding:5px 0;">${l}</div>`);

        let firstDay = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1).getDay();
        firstDay = (firstDay === 0) ? 6 : firstDay - 1;
        for(let i=0; i<firstDay; i++) cal.innerHTML += `<div></div>`;

        const totalDays = new Date(viewDate.getFullYear(), viewDate.getMonth()+1, 0).getDate();
        const todayStr = getTodayStr();

        for(let d=1; d<=totalDays; d++) {
            const dObj = new Date(viewDate.getFullYear(), viewDate.getMonth(), d);
            const dStr = `${dObj.getFullYear()}-${String(dObj.getMonth() + 1).padStart(2, '0')}-${String(dObj.getDate()).padStart(2, '0')}`;
            const stat = state.dayStats[dStr] || (dObj.getDay() === 0 ? "off" : "work");
            const hasData = state.history.some(h => new Date(h.start).toLocaleDateString() === dObj.toLocaleDateString());
            
            const div = document.createElement('div');
            div.className = `day ${dStr === todayStr ? 'today' : ''} ${hasData ? 'has-data' : ''} status-${stat}`;
            div.innerText = d;
            div.onclick = () => openDay(dStr);
            cal.appendChild(div);
        }
    }

    function initEmojiPickers() {
        document.getElementById('pickerIndustrial').innerHTML = EMOJIS.industrial.map(e => `<div class="emoji-item" onclick="selectEmoji('${e}')">${e}</div>`).join('');
        document.getElementById('pickerTools').innerHTML = EMOJIS.tools.map(e => `<div class="emoji-item" onclick="selectEmoji('${e}')">${e}</div>`).join('');
        document.getElementById('pickerOffice').innerHTML = EMOJIS.office.map(e => `<div class="emoji-item" onclick="selectEmoji('${e}')">${e}</div>`).join('');
    }

    function selectEmoji(e) {
        document.getElementById('eIcon').value = e;
        document.querySelectorAll('.emoji-item').forEach(el => el.style.background = el.innerText === e ? '#e0f0ff' : 'transparent');
    }

    function openSettings() {
        const schList = document.getElementById('schList');
        schList.innerHTML = '';
        const dNamesPl = ["Niedziela","Poniedziałek","Wtorek","Środa","Czwartek","Piątek","Sobota"];
        const dNamesDe = ["Sonntag","Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag"];
        const dNamesEn = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
        
        let dNames = dNamesEn;
        if(sysLang === 'pl') dNames = dNamesPl;
        else if(sysLang === 'de') dNames = dNamesDe;

        [1,2,3,4,5,6,0].forEach(i => {
            const s = state.schedule[i];
            schList.innerHTML += `
                <div class="config-group">
                    <div class="config-row"><b>${dNames[i]}</b> <input type="checkbox" id="en${i}" ${s.en?'checked':''}></div>
                    <div class="config-row">Start: <input type="time" id="s${i}" value="${s.s}"> Stop: <input type="time" id="e${i}" value="${s.e}"></div>
                </div>`;
        });
        const sel = document.getElementById('autoTaskSelect');
        sel.innerHTML = '<option value="last">Ostatnie aktywne zadanie</option>' + state.tasks.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
        sel.value = state.autoTaskId;
        document.getElementById('settingsModal').style.display = 'flex';
    }

    function saveSettings() {
        [1,2,3,4,5,6,0].forEach(i => {
            if(document.getElementById('en'+i)) {
                state.schedule[i].en = document.getElementById('en'+i).checked;
                state.schedule[i].s = document.getElementById('s'+i).value;
                state.schedule[i].e = document.getElementById('e'+i).value;
            }
        });
        state.autoTaskId = document.getElementById('autoTaskSelect').value;
        save(); closeModals();
    }

    function openBreaks() {
        const sch = state.schedule[1];
        document.getElementById('p1S').value = sch.p1;
        document.getElementById('p2S').value = sch.p2;
        document.getElementById('breakModal').style.display = 'flex';
    }

    function saveBreaks() {
        const p1 = document.getElementById('p1S').value;
        const p2 = document.getElementById('p2S').value;
        [1,2,3,4,5,6,0].forEach(i => {
            state.schedule[i].p1 = p1;
            state.schedule[i].p2 = p2;
        });
        save(); closeModals();
    }

    function openDay(dStr) {
        currentDaySelected = dStr;
        document.getElementById('dayModalTitle').innerText = dStr;
        const logs = state.history.filter(h => new Date(h.start).toLocaleDateString() === new Date(dStr).toLocaleDateString());
        const sums = {};
        logs.forEach(l => sums[l.name] = (sums[l.name]||0) + (l.end - l.start));
        
        let html = `<b>${curLang.daySummaryTitle}</b><br>`;
        let total = 0;
        for(let n in sums) {
            html += `${n}: ${(sums[n]/3600000).toFixed(2)}h<br>`;
            total += sums[n];
        }
        document.getElementById('daySummary').innerHTML = total > 0 ? html : curLang.dayNoData;
        document.getElementById('dayStatusSelect').value = state.dayStats[dStr] || (new Date(dStr).getDay() === 0 ? "off" : "work");
        document.getElementById('dayModal').style.display = 'flex';
    }

    function updateDayStatus() {
        state.dayStats[currentDaySelected] = document.getElementById('dayStatusSelect').value;
        save(); renderCalendar();
    }

    function openEdit(id, e) {
        if(e) e.stopPropagation();
        window.editId = id;
        const t = state.tasks.find(x => x.id === id) || {name:'', icon:'🏭', nfc:''};
        document.getElementById('eName').value = t.name;
        document.getElementById('eIcon').value = t.icon;
        document.getElementById('eNfc').value = t.nfc;
        document.getElementById('delBtn').style.display = id ? 'block' : 'none';
        selectEmoji(t.icon);
        document.getElementById('editModal').style.display = 'flex';
    }

    function saveTask() {
        const n=document.getElementById('eName').value, i=document.getElementById('eIcon').value, nf=document.getElementById('eNfc').value;
        if(!n) return alert("Podaj nazwę!");
        if(window.editId) { let t=state.tasks.find(x=>x.id==window.editId); t.name=n; t.icon=i; t.nfc=nf; }
        else state.tasks.push({id:Date.now(), name:n, icon:i, nfc:nf});
        save(); renderTasks(); closeModals();
    }

    function deleteTask() {
        state.tasks = state.tasks.filter(x => x.id != window.editId);
        save(); renderTasks(); closeModals();
    }

    function save() { indexedDB.open(DB_NAME, 1).onsuccess = e => e.target.result.transaction("data", "readwrite").objectStore("data").put(state, "state"); }
    function changeMonth(v) { viewDate.setMonth(viewDate.getMonth()+v); renderCalendar(); }
    function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }
</script>
</body>
</html>
