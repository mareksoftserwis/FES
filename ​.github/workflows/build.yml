name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Cordova
      run: npm install -g cordova

    - name: Create Cordova Structure & Build
      run: |
        mkdir build-dir
        cd build-dir
        cordova create app com.mareksoftserwis.fes "NFCTracker"
        cd app
        
        # Instalujemy stabilną platformę android@12
        cordova platform add android@12.0.0 --no-telemetry
        
        # Kopiujemy Twój oryginalny plik HTML z repozytorium
        cp ../../index.html www/index.html
        
        # AUTOMATYCZNA POPRAWKA UPRAWNIEŃ NFC (Wstrzykujemy mostek Cordova.js i łatamy NDEFReader)
        # Wstawiamy cordova.js zaraz po znaczniku <head>
        sed -i 's|<head>|<head><script src="cordova.js"></script>|g' www/index.html
        
        # Nadpisujemy stary kod NDEFReader naszym natywnym nasłuchiwaczem sprzętowym
        cat << 'EOF' > patch.js
        <script>
        document.addEventListener('deviceready', () => {
            console.log("Natywne NFC Cordova zainicjalizowane.");
            if (typeof nfc !== 'undefined') {
                nfc.addNdefListener(
                    (nfcEvent) => {
                        const tagId = nfcEvent.tag.id;
                        const uid = tagId.map(x => ("00" + x.toString(16).toUpperCase()).slice(-2)).join(":");
                        console.log("Odczytano sprzętowo UID: " + uid);
                        
                        // Przesyłamy UID do pól tekstowych z Twojego oryginalnego kodu
                        const input = document.querySelector('input[placeholder*="Przybliż"], input[id*="nfc"]');
                        if (input) { input.value = uid; input.dispatchEvent(new Event('input')); }
                        alert("Odczytano Tag NFC: " + uid);
                    },
                    () => console.log("Nasłuchiwanie anteny aktywne."),
                    (err) => console.log("Błąd inicjalizacji anteny: " + JSON.stringify(err))
                );
            }
        }, false);
        </script>
        EOF
        sed -i '/<\/body>/r patch.js' www/index.html
        
        # Generujemy czysty i bezbłędny config.xml
        cat << 'EOF' > config.xml
        <?xml version='1.0' encoding='utf-8'?>
        <widget id="com.mareksoftserwis.fes" version="1.0.0" xmlns="http://www.w3.org/ns/widgets">
            <name>NFC Tracker Pro</name>
            <description>NFC Task Timer Application</description>
            <content src="index.html" />
            <access origin="*" />
            <allow-intent href="http://*/*" />
            <allow-intent href="https://*/*" />
            <preference name="GradleVersion" value="8.7" />
        </widget>
        EOF
        
        # Instalujemy poprawną nazwę wtyczki z repozytorium npm
        cordova plugin add phonegap-nfc --no-telemetry
        
        # Budujemy aplikację z wymuszeniem stabilnej wersji Gradle
        CORDOVA_ANDROID_GRADLE_VERSION="8.7" cordova build android --device --no-telemetry

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: build-dir/app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
