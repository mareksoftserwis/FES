name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'

    # Wymuszamy instalację i pełną integrację Gradle 7.1.1 w systemie
    - name: Setup Gradle 7.1.1
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '7.1.1'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '16'

    - name: Install Cordova
      run: npm install -g cordova@11.1.0

    - name: Create Cordova Structure & Build
      run: |
        mkdir build-dir
        cd build-dir
        
        # Tworzymy czysty projekt
        cordova create app com.mareksoftserwis.fes "NFCTracker"
        cd app
        
        # Stabilna wersja platformy Android dopasowana do Javy 11 i starszego Gradle
        cordova platform add android@10.1.2 --no-telemetry
        
        # Generujemy idealny config.xml dla Androida 10
        cat << 'EOF' > config.xml
        <?xml version='1.0' encoding='utf-8'?>
        <widget id="com.mareksoftserwis.fes" version="1.0.0" xmlns="http://www.w3.org/ns/widgets">
            <name>FES Tracker</name>
            <description>NFC Task Timer Application</description>
            <content src="index.html" />
            <access origin="*" />
            <allow-intent href="http://*/*" />
            <allow-intent href="https://*/*" />
            <preference name="android-minSdkVersion" value="22" />
            <preference name="android-targetSdkVersion" value="30" />
        </widget>
        EOF
        
        # Kopiujemy Twój plik HTML
        cp ../../index.html www/index.html
        
        # Instalujemy wtyczkę NFC (w tej wersji środowiska przejdzie bez błędów kodu)
        cordova plugin add phonegap-nfc --no-telemetry
        
        # Oczyszczanie ścieżek przed startem
        unset GRADLE_HOME
        
        # Budujemy plik APK
        cordova build android --device --no-telemetry

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: build-dir/app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
