name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Cordova
      run: npm install -g cordova

    - name: Create Cordova Structure & Build
      run: |
        mkdir build-dir
        cd build-dir
        cordova create app com.mareksoftserwis.fes "NFCTracker"
        cd app
        
        # Instalujemy najnowszą stabilną wersję dla nowoczesnych systemów Android
        cordova platform add android@13.0.0 --no-telemetry
        
        # Kopiujemy Twój zaktualizowany plik index.html z repozytorium
        cp ../../index.html www/index.html
        
        # Tworzymy czysty, nowoczesny plik config.xml pasujący do Androida 13
        cat << 'EOF' > config.xml
        <?xml version='1.0' encoding='utf-8'?>
        <widget id="com.mareksoftserwis.fes" version="1.0.0" xmlns="http://www.w3.org/ns/widgets">
            <name>FES Tracker</name>
            <description>NFC Task Timer Application</description>
            <content src="index.html" />
            <access origin="*" />
            <allow-intent href="http://*/*" />
            <allow-intent href="https://*/*" />
            <preference name="android-minSdkVersion" value="26" />
            <preference name="android-targetSdkVersion" value="34" />
        </widget>
        EOF
        
        # Instalujemy oficjalną, zaktualizowaną wtyczkę NFC
        cordova plugin add phonegap-nfc --no-telemetry
        
        # Budujemy plik APK (system automatycznie pobierze poprawne Gradle 8.x)
        cordova build android --device --no-telemetry

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: build-dir/app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
