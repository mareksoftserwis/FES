name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Cordova
      run: npm install -g cordova

    - name: Create Cordova Structure & Build
      run: |
        mkdir build-dir
        cd build-dir
        
        # Tworzymy aplikację w czystym środowisku
        cordova create app com.mareksoftserwis.fes "NFCTracker"
        cd app
        
        # Wstrzykujemy idealny config.xml do wygenerowanego folderu
        cat << 'EOF' > config.xml
        <?xml version='1.0' encoding='utf-8'?>
        <widget id="com.mareksoftserwis.fes" version="1.0.0" xmlns="http://www.w3.org/ns/widgets">
            <name>FES Tracker</name>
            <description>NFC Task Timer Application</description>
            <content src="index.html" />
            <access origin="*" />
            <allow-intent href="http://*/*" />
            <allow-intent href="https://*/*" />
            <preference name="android-minSdkVersion" value="26" />
            <preference name="android-targetSdkVersion" value="33" />
        </widget>
        EOF
        
        # Kopiujemy Twój plik HTML
        cp ../../index.html www/index.html
        
        # Dodajemy platformę android
        cordova platform add android@12.0.0 --no-telemetry
        
        # Instalujemy wtyczkę NFC
        cordova plugin add phonegap-nfc --no-telemetry
        
        # KLUCZOWY MOMENT: Czyścimy zmienną CORDOVA_ANDROID_GRADLE_DISTRIBUTION_URL i odpinamy systemowe Gradle z GitHuba
        # Zmuszamy skrypt, by użył stabilnego instalatora gradlew z wnętrza platformy Android.
        unset GRADLE_HOME
        unset GRADLE_USER_HOME
        
        # Budujemy plik APK z wymuszeniem ignorowania systemowych ścieżek
        PATH=$(echo $PATH | sed -e 's/:\/usr\/share\/gradle[^:]*//g') cordova build android --device --no-telemetry

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: build-dir/app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
