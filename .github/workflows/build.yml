name: Build NFC App
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Tworzymy projekt Androida od zera bez Cordovy
      - name: Setup Android Project
        run: |
          npm install -g @capacitor/cli @capacitor/core
          mkdir www
          cp index.html www/index.html
          # Tworzymy manifest dla Capacitora
          echo '{"appId": "com.mareksoftserwis.fes","appName": "FESTracker","webDir": "www","bundledWebRuntime": false}' > capacitor.config.json
          npx cap add android

      # Wstrzykujemy uprawnienia NFC bezpośrednio do pliku systemowego
      - name: Inject NFC Permissions
        run: |
          sed -i '/<application/i <uses-permission android:name="android.permission.NFC" />\n<uses-feature android:name="android.hardware.nfc" android:required="true" />' android/app/src/main/AndroidManifest.xml

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FES-Tracker-NFC
          path: android/app/build/outputs/apk/debug/app-debug.apk
