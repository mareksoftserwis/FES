name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Cordova
      run: npm install -g cordova

    - name: Create Cordova Structure & Build
      run: |
        mkdir build-dir
        cd build-dir
        
        # Tworzymy aplikację czystą komendą Cordovy
        cordova create app com.mareksoftserwis.fes "NFCTracker"
        cd app
        
        # Kopiujemy konfigurację oraz Twój plik HTML bezpośrednio z głównego katalogu
        cp ../../config.xml config.xml
        cp ../../index.html www/index.html
        
        # Dodajemy oficjalną platformę Android
        cordova platform add android@12.0.0 --no-telemetry
        
        # Instalujemy oficjalną i stabilną wtyczkę NFC
        cordova plugin add phonegap-nfc --no-telemetry
        
        # Budujemy końcowy plik APK
        cordova build android --device --no-telemetry

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: build-dir/app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
