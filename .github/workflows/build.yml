name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Cordova
      run: npm install -g cordova

    - name: Create Cordova Structure & Build
      run: |
        mkdir build-dir
        cd build-dir
        cordova create app com.mareksoftserwis.fes "NFCTracker"
        cd app
        cordova platform add android@12.0.0 --no-telemetry
        
        # Kopiujemy TYLKO index.html (kod aplikacji)
        cp ../../index.html www/index.html
        
        # Generujemy NOWY, czysty config.xml bezpośrednio w konsoli
        cat << 'EOF' > config.xml
        <?xml version='1.0' encoding='utf-8'?>
        <widget id="com.mareksoftserwis.fes" version="1.0.0" xmlns="http://www.w3.org/ns/widgets">
            <name>NFC Tracker Pro</name>
            <description>NFC Task Timer Application</description>
            <content src="index.html" />
            <access origin="*" />
            <allow-intent href="http://*/*" />
            <allow-intent href="https://*/*" />
        </widget>
        EOF
        
        # Instalujemy wtyczkę NFC i budujemy aplikację
        cordova plugin add phonegap-nfc --no-telemetry
        cordova build android --device --no-telemetry

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: build-dir/app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
