name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '11'

    - name: Setup Gradle 7.6
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '7.6'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Cordova
      run: npm install -g cordova@11.1.0

    - name: Create Cordova Structure & Build
      run: |
        mkdir build-dir
        cd build-dir
        cordova create app com.mareksoftserwis.fes "NFCTracker"
        cd app
        
        # Używamy ultra-stabilnej bazy pod Androida
        cordova platform add android@10.1.2 --no-telemetry
        
        # Kopiujemy Twój gotowy plik index.html z repozytorium
        cp ../../index.html www/index.html
        
        # Tworzymy podstawowy, czysty plik config.xml
        cat << 'EOF' > config.xml
        <?xml version='1.0' encoding='utf-8'?>
        <widget id="com.mareksoftserwis.fes" version="1.0.0" xmlns="http://www.w3.org/ns/widgets">
            <name>FES Tracker</name>
            <description>NFC Task Timer Application</description>
            <content src="index.html" />
            <access origin="*" />
            <allow-intent href="http://*/*" />
            <allow-intent href="https://*/*" />
            <preference name="android-minSdkVersion" value="22" />
            <preference name="android-targetSdkVersion" value="32" />
        </widget>
        EOF
        
        # Instalacja sprawdzonej wtyczki NFC
        cordova plugin add phonegap-nfc --no-telemetry
        
        # Budowanie APK z przypięciem właściwych zmiennych środowiskowych
        export JAVA_HOME=$JAVA_HOME_11_X64
        cordova build android --device --no-telemetry

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: build-dir/app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
