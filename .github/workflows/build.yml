      # Tworzymy projekt Androida od zera bez Cordovy
      - name: Setup Android Project
        run: |
          # Tworzymy wymagany plik package.json
          npm init -y
          # Instalujemy Capacitor CLI i rdzeń lokalnie
          npm install @capacitor/cli @capacitor/core @capacitor/android
          
          mkdir -p www
          cp index.html www/index.html
          
          # Inicjalizacja Capacitora z automatycznym potwierdzeniem
          npx cap init "FESTracker" "com.mareksoftserwis.fes" --web-dir=www
          
          # Dodajemy platformę Android
          npx cap add android
