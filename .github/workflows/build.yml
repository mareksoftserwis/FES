name: Build NFC App
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Initialize Project
        run: |
          npm init -y
          # Instalujemy konkretne, najnowsze stabilne wersje
          npm install @capacitor/cli@latest @capacitor/core@latest @capacitor/android@latest
          mkdir -p www
          cp index.html www/index.html
          npx cap init "FESTracker" "com.mareksoftserwis.fes" --web-dir=www
          npx cap add android

      - name: Fix Project Configuration
        run: |
          # Wstrzyknięcie NFC
          sed -i '/<application/i <uses-permission android:name="android.permission.NFC" />\n<uses-feature android:name="android.hardware.nfc" android:required="true" />' android/app/src/main/AndroidManifest.xml
          # Wyłączenie blokujących błędów Lint i wymuszenie Javy 21 w Gradle
          echo "android.lintOptions.abortOnError=false" >> android/local.properties
          sed -i 's/sourceCompatibility = .*/sourceCompatibility = JavaVersion.VERSION_21/' android/app/build.gradle
          sed -i 's/targetCompatibility = .*/targetCompatibility = JavaVersion.VERSION_21/' android/app/build.gradle

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FES-Tracker-Final
          path: android/app/build/outputs/apk/debug/app-debug.apk
